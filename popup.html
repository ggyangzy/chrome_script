<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heart Move Effect</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Chrome Extension</p>
      <h1>Random Heart Move Effect</h1>
      <p class="hint">Show floating hearts at random positions when you move the mouse.</p>

      <label class="toggle" for="enabled-toggle">
        <div>
          <strong>Enable</strong>
          <span id="status-text">Loading...</span>
        </div>
        <input id="enabled-toggle" type="checkbox" />
      </label>

      <section class="note">
        <p>Changes apply to already open tabs after refresh.</p>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
